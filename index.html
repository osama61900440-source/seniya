<!DOCTYPE html>
<html lang="am" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>ንግድ መከታተያ</title>
<style>
/* ---------- reset & base ---------- */
* { box-sizing: border-box; }
html,body { margin:0; padding:0; background:#F5F7F9; }
body { font-family: -apple-system, "Noto Sans Ethiopic", "Segoe UI", Roboto, Arial, sans-serif; color:#1B3358; -webkit-tap-highlight-color:transparent; }
button { font-family:inherit; cursor:pointer; }
input, select, textarea { font-family:inherit; }
::placeholder { color:#94a3b8; }

/* ---------- layout ---------- */
.app { max-width:448px; margin:0 auto; min-height:100vh; position:relative; background:#F5F7F9; display:flex; flex-direction:column; }
.content { flex:1; overflow-y:auto; padding-bottom:112px; }
.px4 { padding-left:16px; padding-right:16px; }
.px5 { padding-left:20px; padding-right:20px; }
.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}.mt5{margin-top:20px}
.pt4{padding-top:16px}.pt5{padding-top:20px}.pb2{padding-bottom:8px}
.flex { display:flex; } .items-center{align-items:center} .justify-between{justify-content:space-between}
.justify-center{justify-content:center} .gap2{gap:8px} .gap3{gap:12px} .flex1{flex:1} .flex-col{flex-direction:column}
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.min-w0{min-width:0}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.text-right{text-align:right}
.hidden{display:none !important}

/* ---------- typography ---------- */
.h1 { font-size:20px; font-weight:800; color:#123A5E; margin:0; }
.h2 { font-size:16px; font-weight:700; color:#123A5E; margin:0; }
.label-sm { font-size:11px; color:#94a3b8; }
.text-sm { font-size:14px; } .text-xs{font-size:12px;}
.font-semibold{font-weight:600} .font-bold{font-weight:700} .font-extrabold{font-weight:800}
.navy{color:#123A5E} .green{color:#3FAE79} .orange{color:#E67E22} .red{color:#EB5757} .muted{color:#94a3b8}

/* ---------- cards ---------- */
.card { background:#fff; border-radius:18px; box-shadow:0 1px 3px rgba(18,58,94,.06), 0 1px 2px rgba(18,58,94,.04); padding:16px; }
.card-sm { padding:12px; }
.stat-card { background:#fff; border-radius:18px; box-shadow:0 1px 3px rgba(18,58,94,.06); padding:16px; }
.icon-box { width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; margin-bottom:8px; }

/* ---------- header ---------- */
.header { position:sticky; top:0; z-index:5; display:flex; align-items:center; justify-content:space-between; padding:16px; background:rgba(255,255,255,.92); backdrop-filter:blur(6px); border-bottom:1px solid #F1F3F5; }
.header .spacer{width:32px}

/* ---------- search ---------- */
.search { display:flex; align-items:center; gap:8px; background:#fff; border-radius:999px; padding:10px 16px; box-shadow:0 1px 3px rgba(18,58,94,.06); }
.search input { flex:1; border:none; outline:none; background:transparent; font-size:14px; }

/* ---------- bottom nav ---------- */
.navwrap { position:absolute; left:0; right:0; bottom:0; padding:0 12px 12px; }
.nav { background:#123A5E; border-radius:999px; display:flex; align-items:center; justify-content:space-between; padding:8px; box-shadow:0 10px 24px rgba(18,58,94,.35); }
.navbtn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:6px 0; border:none; background:transparent; border-radius:999px; }
.navbtn.active { background:rgba(255,255,255,.14); }
.navbtn span { font-size:10px; margin-top:2px; color:#8FA6BE; }
.navbtn.active span { color:#fff; }

/* ---------- fab ---------- */
.fab { position:absolute; right:20px; bottom:96px; width:56px; height:56px; border-radius:18px; background:#3FAE79; border:none; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(63,174,121,.4); transition:transform .12s; }
.fab:active { transform:scale(.94); }
.fab-mini-wrap { position:absolute; right:20px; bottom:96px; display:flex; flex-direction:column; align-items:flex-end; gap:12px; }
.fab-action { display:flex; align-items:center; gap:8px; background:#fff; box-shadow:0 6px 16px rgba(18,58,94,.18); border-radius:999px; padding:8px 8px 8px 16px; border:none; }
.fab-action span.lbl { font-size:12px; font-weight:600; color:#123A5E; white-space:nowrap; }
.fab-action .ic { width:32px; height:32px; border-radius:999px; background:#E7F5EE; display:flex; align-items:center; justify-content:center; }

/* ---------- empty state ---------- */
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:96px 0; color:#94a3b8; gap:8px; }

/* ---------- sheet / modal ---------- */
.overlay { position:fixed; inset:0; z-index:50; display:flex; justify-content:center; }
.overlay-bg { position:absolute; inset:0; background:rgba(0,0,0,.4); }
.sheet { position:relative; width:100%; max-width:448px; background:#fff; margin-top:auto; border-radius:24px 24px 0 0; max-height:92vh; display:flex; flex-direction:column; animation:slideUp .18s ease-out; }
@keyframes slideUp { from{ transform:translateY(24px); opacity:.6 } to{ transform:translateY(0); opacity:1 } }
.sheet-header { display:flex; align-items:center; gap:12px; padding:16px 20px; background:#E7F5EE; border-radius:24px 24px 0 0; }
.sheet-back { width:32px; height:32px; border-radius:999px; background:#fff; border:none; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 2px rgba(0,0,0,.08); }
.sheet-body { overflow-y:auto; padding:20px; flex:1; }
.sheet-footer { padding:16px 20px; border-top:1px solid #F1F3F5; }

/* ---------- form ---------- */
.field { margin-bottom:16px; }
.field label { display:block; font-size:13px; font-weight:600; color:#123A5E; margin-bottom:6px; }
.req { color:#EB5757; }
.input { width:100%; border-radius:12px; padding:12px 14px; font-size:14px; outline:none; border:1px solid transparent; background:#F8FAFB; }
.input:focus { border-color:#c9d5e0; }
.err { border-color:#EB5757 !important; }
.errmsg { color:#EB5757; font-size:11px; margin-top:4px; }

/* ---------- buttons ---------- */
.btn { border:none; border-radius:999px; padding:14px; font-weight:700; font-size:14px; width:100%; }
.btn-navy { background:#123A5E; color:#fff; }
.btn-navy:disabled { opacity:.4; }
.btn-outline { background:#fff; border:1px solid #E2E8F0; color:#123A5E; }
.btn-row { display:flex; gap:12px; }

/* ---------- list item ---------- */
.litem { background:#fff; border-radius:18px; padding:12px; display:flex; align-items:center; gap:12px; box-shadow:0 1px 3px rgba(18,58,94,.06); }
.avatar { width:44px; height:44px; border-radius:12px; background:#E7F5EE; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.trash-btn { border:none; background:transparent; padding:6px; color:#cbd5e1; }
.trash-btn:hover { color:#EB5757; }

/* ---------- chart ---------- */
.chart-bars { display:flex; align-items:flex-end; justify-content:space-between; gap:8px; height:140px; }
.chart-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
.chart-bargroup { width:100%; display:flex; align-items:flex-end; justify-content:center; gap:4px; height:100%; }
.chart-bar { width:8px; border-radius:3px; }
.legend { display:flex; align-items:center; justify-content:center; gap:16px; margin-top:12px; }
.legend span.dot { width:10px; height:10px; border-radius:3px; display:inline-block; margin-inline-end:4px; }

/* ---------- toast ---------- */
.toast { position:absolute; bottom:96px; left:50%; transform:translateX(-50%); background:#1e293b; color:#fff; font-size:13px; padding:10px 18px; border-radius:999px; box-shadow:0 8px 20px rgba(0,0,0,.25); z-index:60; }

/* ---------- banner ---------- */
.banner { background:#FFF4E5; color:#92400E; font-size:12px; padding:10px 16px; text-align:center; }
</style>
</head>
<body>
<div id="root"></div>

<script>
(function () {
"use strict";

/* ================= constants ================= */
var NAVY = "#123A5E", GREEN = "#3FAE79", ORANGE = "#E67E22", RED = "#EB5757", BLUE = "#2E86DE";
var GREEN_LIGHT = "#E7F5EE";
var STORAGE_KEY = "niksa-business-data-v2";
var MONTHS = ["ጃንዩ", "ፌብሩ", "ማርች", "ኤፕሪ", "ሜይ", "ጁን", "ጁላይ", "ኦገስ", "ሴፕቴ", "ኦክቶ", "ኖቬም", "ዲሴም"];

/* ================= tiny DOM helper ================= */
function el(tag, props, children) {
  var e = document.createElement(tag);
  props = props || {};
  for (var k in props) {
    if (!props.hasOwnProperty(k)) continue;
    var v = props[k];
    if (v === undefined || v === null) continue;
    if (k === "class") e.className = v;
    else if (k === "style" && typeof v === "object") { for (var s in v) e.style[s] = v[s]; }
    else if (k.indexOf("on") === 0 && typeof v === "function") e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "html") e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  children = children || [];
  if (!Array.isArray(children)) children = [children];
  children.forEach(function (c) {
    if (c === null || c === undefined || c === false) return;
    if (typeof c === "string" || typeof c === "number") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

/* ================= icons (inline svg, no external assets) ================= */
function svg(paths, opts) {
  opts = opts || {};
  var size = opts.size || 18, color = opts.color || "currentColor";
  var s = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  s.setAttribute("width", size); s.setAttribute("height", size);
  s.setAttribute("viewBox", "0 0 24 24"); s.setAttribute("fill", "none");
  s.setAttribute("stroke", color); s.setAttribute("stroke-width", "2");
  s.setAttribute("stroke-linecap", "round"); s.setAttribute("stroke-linejoin", "round");
  if (opts.style) for (var k in opts.style) s.style[k] = opts.style[k];
  paths.forEach(function (d) {
    if (d.circle) {
      var c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      c.setAttribute("cx", d.circle[0]); c.setAttribute("cy", d.circle[1]); c.setAttribute("r", d.circle[2]);
      if (d.fill) c.setAttribute("fill", color);
      s.appendChild(c);
    } else if (d.rect) {
      var r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      r.setAttribute("x", d.rect[0]); r.setAttribute("y", d.rect[1]); r.setAttribute("width", d.rect[2]); r.setAttribute("height", d.rect[3]); r.setAttribute("rx", d.rect[4] || 0);
      s.appendChild(r);
    } else {
      var p = document.createElementNS("http://www.w3.org/2000/svg", "path");
      p.setAttribute("d", d.d || d);
      s.appendChild(p);
    }
  });
  return s;
}
var Icons = {
  home: function (o) { return svg([{ d: "M3 11.5 12 4l9 7.5" }, { d: "M5 10v10h14V10" }], o); },
  tag: function (o) { return svg([{ d: "M20 12.5 12.5 20a2 2 0 0 1-2.8 0L4 14.3a2 2 0 0 1 0-2.8L11.5 4H19a1 1 0 0 1 1 1v7.5Z" }, { circle: [15, 9, 1.1], fill: 1 }], o); },
  bag: function (o) { return svg([{ d: "M6 8h12l-1 12H7L6 8Z" }, { d: "M9 8V6a3 3 0 0 1 6 0v2" }], o); },
  pkg: function (o) { return svg([{ d: "M21 8v8l-9 5-9-5V8l9-5 9 5Z" }, { d: "M3 8l9 5 9-5" }, { d: "M12 13v8" }], o); },
  wallet: function (o) { return svg([{ rect: [3, 6, 18, 13, 2] }, { d: "M3 10h18" }, { circle: [16.5, 14, 1], fill: 1 }], o); },
  plus: function (o) { return svg([{ d: "M12 5v14M5 12h14" }], o); },
  x: function (o) { return svg([{ d: "M18 6 6 18M6 6l12 12" }], o); },
  back: function (o) { return svg([{ d: "M15 18l-6-6 6-6" }], o); },
  search: function (o) { return svg([{ circle: [11, 11, 7] }, { d: "m20 20-3.5-3.5" }], o); },
  bank: function (o) { return svg([{ d: "M3 10 12 4l9 6" }, { d: "M5 10v9M10 10v9M14 10v9M19 10v9" }, { d: "M3 21h18" }], o); },
  trash: function (o) { return svg([{ d: "M4 7h16" }, { d: "M6 7l1 13h10l1-13" }, { d: "M9 7V4h6v3" }], o); },
  receipt: function (o) { return svg([{ d: "M6 3h12v18l-2.5-1.5L13 21l-2.5-1.5L8 21l-2-1.5V3Z" }, { d: "M9 8h6M9 12h6" }], o); },
  up: function (o) { return svg([{ d: "m3 17 6-6 4 4 8-8" }, { d: "M15 7h6v6" }], o); },
  down: function (o) { return svg([{ d: "m3 7 6 6 4-4 8 8" }, { d: "M15 17h6v-6" }], o); },
  piggy: function (o) { return svg([{ d: "M4 12a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1a2 2 0 0 1-2 2h-1l-1 3H9l-1-3H7a3 3 0 0 1-3-3v0Z" }, { circle: [15, 10, 0.8], fill: 1 }, { d: "M9 6V4M4 13l-2-1" }], o); }
};

/* ================= money helpers (integer cents math => no float drift) ================= */
function toCents(str) { var n = parseFloat(str); if (isNaN(n)) n = 0; return Math.round(n * 100); }
function fmt(cents) {
  cents = Math.round(Number(cents) || 0);
  var neg = cents < 0; cents = Math.abs(cents);
  var whole = Math.floor(cents / 100), frac = cents % 100;
  var wholeStr = whole.toLocaleString("en-US");
  return (neg ? "-" : "") + "Br " + wholeStr + "." + String(frac).padStart(2, "0");
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function todayISO() { return new Date().toISOString().slice(0, 10); }
function round3(n) { return Math.round((Number(n) || 0) * 1000) / 1000; }

/* ================= data model =================
items:     {id,name,sku,category,unit,priceCents,openingStock}
accounts:  {id,name,type,openingBalanceCents}
sales:     {id,party,date,code,accountId,lines:[{itemId,name,qty,priceCents}],totalCents}
purchases: same shape as sales
expenses:  {id,title,amountCents,date,accountId}
Balances / stock are ALWAYS derived from this log — never stored/incremented directly.
This guarantees the books can never drift or double-count. */

function emptyData() {
  return {
    items: [],
    sales: [],
    purchases: [],
    expenses: [],
    accounts: [{ id: "cash", name: "Cash", type: "ጥሬ ገንዘብ", openingBalanceCents: 0 }]
  };
}

function accountBalance(data, accountId) {
  var acc = data.accounts.find(function (a) { return a.id === accountId; });
  if (!acc) return 0;
  var bal = acc.openingBalanceCents || 0;
  data.sales.forEach(function (s) { if (s.accountId === accountId) bal += s.totalCents; });
  data.purchases.forEach(function (p) { if (p.accountId === accountId) bal -= p.totalCents; });
  data.expenses.forEach(function (e) { if (e.accountId === accountId) bal -= e.amountCents; });
  return bal;
}
function totalBalance(data) {
  return data.accounts.reduce(function (s, a) { return s + accountBalance(data, a.id); }, 0);
}
function itemStock(data, itemId) {
  var it = data.items.find(function (i) { return i.id === itemId; });
  if (!it) return 0;
  var stock = Number(it.openingStock) || 0;
  data.purchases.forEach(function (p) { p.lines.forEach(function (l) { if (l.itemId === itemId) stock += l.qty; }); });
  data.sales.forEach(function (s) { s.lines.forEach(function (l) { if (l.itemId === itemId) stock -= l.qty; }); });
  return round3(stock);
}

/* ================= storage ================= */
var storageAvailable = true;
function loadData() {
  try {
    var v = localStorage.getItem(STORAGE_KEY);
    if (!v) return emptyData();
    var parsed = JSON.parse(v);
    if (!parsed || !Array.isArray(parsed.items)) return emptyData();
    if (!Array.isArray(parsed.accounts) || parsed.accounts.length === 0) parsed.accounts = emptyData().accounts;
    if (!Array.isArray(parsed.sales)) parsed.sales = [];
    if (!Array.isArray(parsed.purchases)) parsed.purchases = [];
    if (!Array.isArray(parsed.expenses)) parsed.expenses = [];
    return parsed;
  } catch (e) {
    storageAvailable = false;
    return emptyData();
  }
}
function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch (e) { storageAvailable = false; }
}

/* ================= app state ================= */
var state = {
  data: loadData(),
  tab: "home",
  expandFab: false
};

function setData(mutator) {
  state.data = mutator(state.data);
  saveData(state.data);
  renderApp();
}
function showToast(msg) {
  var root = document.getElementById("root");
  var appEl = root.querySelector(".app");
  if (!appEl) return;
  var old = appEl.querySelector(".toast");
  if (old) old.remove();
  var t = el("div", { class: "toast" }, msg);
  appEl.appendChild(t);
  setTimeout(function () { t.remove(); }, 1800);
}

/* ================= mutation actions ================= */
function addItem(item) {
  setData(function (d) {
    d.items.push({
      id: uid(), name: item.name.trim(), sku: item.sku.trim(),
      category: item.category.trim(), unit: item.unit.trim(),
      priceCents: item.priceCents, openingStock: item.openingStock
    });
    return d;
  });
  showToast("ዕቃው ተጨምሯል");
}
function deleteItem(id) {
  setData(function (d) { d.items = d.items.filter(function (i) { return i.id !== id; }); return d; });
}
function addAccount(acc) {
  setData(function (d) {
    d.accounts.push({ id: uid(), name: acc.name.trim(), type: acc.type, openingBalanceCents: acc.openingBalanceCents });
    return d;
  });
  showToast("አካውንት ተጨምሯል");
}
function addSale(sale) {
  setData(function (d) { d.sales.push(sale); return d; });
  showToast("ሽያጭ ተመዝግቧል");
}
function addPurchase(purchase) {
  setData(function (d) { d.purchases.push(purchase); return d; });
  showToast("ግዥ ተመዝግቧል");
}
function addExpense(exp) {
  setData(function (d) { d.expenses.push(exp); return d; });
  showToast("ወጪ ተመዝግቧል");
}

/* ================= shared UI pieces ================= */
function Header(title) {
  return el("div", { class: "header" }, [
    el("div", { class: "spacer" }),
    el("h1", { class: "h1" }, title),
    el("div", { class: "spacer" })
  ]);
}
function SearchBar(placeholder, onInput) {
  var input = el("input", { placeholder: placeholder, oninput: function (e) { onInput(e.target.value); } });
  return el("div", { class: "search" }, [Icons.search({ size: 16, color: "#94a3b8" }), input]);
}
function EmptyState(text) {
  return el("div", { class: "empty" }, [Icons.pkg({ size: 40, color: "#cbd5e1" }), el("div", { class: "text-sm" }, text)]);
}
function Field(labelText, required, inputEl) {
  var lbl = el("label", {}, [labelText + " ", required ? el("span", { class: "req" }, "*") : null]);
  return el("div", { class: "field" }, [lbl, inputEl]);
}

function BottomNav() {
  var items = [
    { key: "home", label: "መነሻ", icon: Icons.home },
    { key: "sales", label: "ሽያጭ", icon: Icons.tag },
    { key: "purchases", label: "ግዥ", icon: Icons.bag },
    { key: "items", label: "ዕቃዎች", icon: Icons.pkg },
    { key: "account", label: "አካውንት", icon: Icons.wallet }
  ];
  var nav = el("div", { class: "nav" });
  items.forEach(function (it) {
    var active = state.tab === it.key;
    var btn = el("button", {
      class: "navbtn" + (active ? " active" : ""),
      onclick: function () { state.tab = it.key; state.expandFab = false; renderApp(); }
    }, [it.icon({ size: 18, color: active ? "#fff" : "#8FA6BE" }), el("span", {}, it.label)]);
    nav.appendChild(btn);
  });
  return el("div", { class: "navwrap" }, [nav]);
}

/* ---- generic bottom sheet ---- */
function openSheet(title, bodyBuilder, footerBuilder) {
  var overlay = el("div", { class: "overlay" });
  var bg = el("div", { class: "overlay-bg", onclick: close });
  var body = el("div", { class: "sheet-body" });
  var footerWrap = el("div", { class: "sheet-footer" });
  var sheet = el("div", { class: "sheet" }, [
    el("div", { class: "sheet-header" }, [
      el("button", { class: "sheet-back", onclick: close }, [Icons.back({ size: 18, color: NAVY })]),
      el("h2", { class: "h2" }, title)
    ]),
    body,
    footerWrap
  ]);
  overlay.appendChild(bg);
  overlay.appendChild(sheet);
  function close() { overlay.remove(); }
  function rerenderFooter() { clear(footerWrap); footerWrap.appendChild(footerBuilder(close, rerenderFooter)); }
  bodyBuilder(body, close, rerenderFooter);
  rerenderFooter();
  document.getElementById("root").querySelector(".app").appendChild(overlay);
  return { close: close, rerenderFooter: rerenderFooter };
}

/* ================= HOME TAB ================= */
function renderHome(container) {
  var data = state.data;
  var now = new Date(), tm = now.getMonth(), ty = now.getFullYear();
  function inMonth(dstr) { var dt = new Date(dstr); return dt.getMonth() === tm && dt.getFullYear() === ty; }
  var salesM = data.sales.filter(function (s) { return inMonth(s.date); }).reduce(function (s, x) { return s + x.totalCents; }, 0);
  var purchM = data.purchases.filter(function (s) { return inMonth(s.date); }).reduce(function (s, x) { return s + x.totalCents; }, 0);

  // recent

    .concat(data.expenses.map(function (e) { return { id: e.id, who: e.title, kind: "ወጪ", date: e.date, amt: e.amountCents, sign: -1 }; }))

  ]);

        ]),

function openTransactionModal(kind) {
  var title = kind === "sale" ? "የሽያጭ ትዕዛዝ" : "የግዢ ትዕዛዝ";
  var partyLabel = kind === "sale" ? "ደንበኛ" : "አቅራቢ";
  var codePrefix = kind === "sale" ? "SO" : "PO";
  var items = state.data.items, accounts = state.data.accounts;
  var lines = [];
  var partyInput, dateInput, accountSelect, pickSelect, qtyInput, linesWrap, totalLabel, errBox;

  function recalcTotal() { return lines.reduce(function (s, l) { return s + Math.round(l.qty * l.priceCents); }, 0); }
  function redrawLines() {
    clear(linesWrap);
    lines.forEach(function (l, idx) {
      linesWrap.appendChild(el("div", { class: "flex items-center justify-between", style: { background: "#fff", border: "1px solid #F1F3F5", borderRadius: "12px", padding: "10px 12px", marginBottom: "8px" } }, [
        el("div", {}, [
          el("div", { class: "text-sm font-semibold", style: { color: NAVY } }, l.name),
          el("div", { class: "text-xs muted" }, l.qty + " × " + fmt(l.priceCents))
        ]),
        el("div", { class: "flex items-center gap2" }, [
          el("div", { class: "text-sm font-bold", style: { color: NAVY } }, fmt(Math.round(l.qty * l.priceCents))),
          el("button", { class: "trash-btn", onclick: function () { lines.splice(idx, 1); redrawLines(); } }, [Icons.x({ size: 16 })])
        ])
      ]));
    });
    if (lines.length > 0) {
      totalLabel.textContent = fmt(recalcTotal());
      linesWrap.appendChild(el("div", { class: "flex items-center justify-between", style: { paddingTop: "8px", borderTop: "1px solid #F1F3F5", marginTop: "4px" } }, [
        el("span", { class: "text-sm font-semibold", style: { color: NAVY } }, "ጠቅላላ"),
        (function () { var s = el("span", { class: "font-extrabold", style: { fontSize: "18px", color: NAVY } }, fmt(recalcTotal())); totalLabel = s; return s; })()
      ]));
    }
  }

  openSheet(title, function (body) {
    partyInput = el("input", { class: "input", value: "Walk In Customer" });
    dateInput = el("input", { class: "input", type: "date", value: todayISO() });
    accountSelect = el("select", { class: "input" });
    accounts.forEach(function (a) { accountSelect.appendChild(el("option", { value: a.id }, a.name)); });

    body.appendChild(Field(partyLabel, true, partyInput));
    body.appendChild(el("div", { class: "grid2" }, [Field("ቀን", true, dateInput), Field(kind === "sale" ? "ገንዘብ ተቀባይ አካውንት" : "ከፋይ አካውንት", true, accountSelect)]));

    var pickerBox = el("div", { class: "card-sm", style: { background: GREEN_LIGHT, borderRadius: "16px" } });
    pickerBox.appendChild(el("div", { class: "text-sm font-semibold", style: { color: NAVY, marginBottom: "8px" } }, "ዕቃ ጨምር"));
    if (items.length === 0) {
      pickerBox.appendChild(el("div", { class: "text-xs", style: { color: "#64748b" } }, "መጀመሪያ ከ«ዕቃዎች» ገፅ ላይ ዕቃ ይጨምሩ"));
    } else {
      pickSelect = el("select", { class: "input", style: { flex: 1 } });
      pickSelect.appendChild(el("option", { value: "" }, "ዕቃ ይምረጡ"));
      items.forEach(function (it) { pickSelect.appendChild(el("option", { value: it.id }, it.name)); });
      qtyInput = el("input", { class: "input", type: "number", min: "0.01", step: "0.01", value: "1", style: { width: "70px", textAlign: "center" } });
      var addBtn = el("button", { class: "btn", style: { width: "auto", padding: "0 14px", background: GREEN, color: "#fff", borderRadius: "12px" } }, [Icons.plus({ size: 18, color: "#fff" })]);
      addBtn.addEventListener("click", function () {
        var item = items.find(function (i) { return i.id === pickSelect.value; });
        if (!item) return;
        var qty = parseFloat(qtyInput.value); if (!qty || qty <= 0) qty = 1;
        lines.push({ itemId: item.id, name: item.name, qty: round3(qty), priceCents: item.priceCents });
        pickSelect.value = ""; qtyInput.value = "1";
        redrawLines();
      });
      var row = el("div", { class: "flex gap2" }, [pickSelect, qtyInput, addBtn]);
      pickerBox.appendChild(row);
    }
    body.appendChild(pickerBox);

    linesWrap = el("div", { class: "mt3" });
    body.appendChild(linesWrap);
    errBox = el("div", { class: "errmsg hidden" });
    body.appendChild(errBox);
  }, function (close) {
    var cancelBtn = el("button", { class: "btn btn-outline" }, "የፈት");
    cancelBtn.addEventListener("click", close);
    var submitBtn = el("button", { class: "btn btn-navy" }, "ቀጣይ");
    submitBtn.addEventListener("click", function () {
      var party = partyInput.value.trim();
      if (!party || lines.length === 0 || !accountSelect.value) {
        errBox.textContent = "እባክዎ " + partyLabel + " ስም እና ቢያንስ አንድ ዕቃ ያስገቡ";
        errBox.classList.remove("hidden");
        return;
      }
      var total = recalcTotal();
      var record = { id: uid(), party: party, date: dateInput.value || todayISO(), accountId: accountSelect.value, code: codePrefix + "-" + String(Date.now()).slice(-5), lines: lines, totalCents: total };
      if (kind === "sale") addSale(record); else addPurchase(record);
      close();
    });
    return el("div", { class: "btn-row" }, [cancelBtn, submitBtn]);
  });
}

    body.appendChild(Field("የአካውንት ስም", true, nameInput));
    body.appendChild(Field("ዓይነት", false, typeSelect));
    body.appendChild(Field("የመክፈቻ ሂሳብ", false, balInput));
    body.appendChild(errBox);
  }, function (close) {
    var btn = el("button", { class: "btn btn-navy" }, "አስቀምጥ");
    btn.addEventListener("click", function () {
      var name = nameInput.value.trim();
      if (!name) { errBox.textContent = "የአካውንት ስም ያስገቡ"; errBox.classList.remove("hidden"); return; }
      addAccount({ name: name, type: typeSelect.value, openingBalanceCents: toCents(balInput.value) });
      close();
    });
    return btn;
  });
}

function openExpenseModal() {
  var titleInput, amountInput, dateInput, accountSelect, errBox;
  openSheet("ወጪ መዝግብ", function (body) {
    titleInput = el("input", { class: "input", placeholder: "ለምሳሌ ኪራይ, ትራንስፖርት" });
    amountInput = el("input", { class: "input", type: "number", step: "0.01", min: "0", placeholder: "0.00" });
    dateInput = el("input", { class: "input", type: "date", value: todayISO() });
    accountSelect = el("select", { class: "input" });
    state.data.accounts.forEach(function (a) { accountSelect.appendChild(el("option", { value: a.id }, a.name)); });
    errBox = el("div", { class: "errmsg hidden" });
    body.appendChild(Field("የወጪ ዓይነት", true, titleInput));
    body.appendChild(el("div", { class: "grid2" }, [Field("መጠን", true, amountInput), Field("ቀን", true, dateInput)]));
    body.appendChild(Field("ከየትኛው አካውንት", true, accountSelect));
    body.appendChild(errBox);
  }, function (close) {
    var btn = el("button", { class: "btn btn-navy" }, "አስቀምጥ");
    btn.addEventListener("click", function () {
      var title = titleInput.value.trim(), amt = toCents(amountInput.value);
      if (!title || amt <= 0 || !accountSelect.value) { errBox.textContent = "እባክዎ ትክክለኛ የወጪ ዓይነት እና መጠን ያስገቡ"; errBox.classList.remove("hidden"); return; }
      addExpense({ id: uid(), title: title, amountCents: amt, date: dateInput.value || todayISO(), accountId: accountSelect.value });
      close();
    });
    return btn;
  });
}

/* ================= root render ================= */
function renderApp() {
  var root = document.getElementById("root");
  clear(root);
  var app = el("div", { class: "app" });

  if (!storageAvailable) {
    app.appendChild(el("div", { class: "banner" }, "ማሳሰቢያ: ውሂብ በዚህ መሳሪያ/browser ላይ በራስ-ሰር መቀመጥ አልቻለም። ውሂብዎ በዚህ ክፍለ-ጊዜ ብቻ ይኖራል።"));
  }

  var content = el("div", { class: "content" });
  if (state.tab === "home") renderHome(content);
  else if (state.tab === "sales") renderList(content, "sale");
  else if (state.tab === "purchases") renderList(content, "purchase");
  else if (state.tab === "items") renderItems(content);
  else if (state.tab === "account") renderAccount(content);
  app.appendChild(content);

  if (state.tab !== "account") {
    var fab = el("button", { class: "fab" }, [Icons.plus({ size: 28, color: "#fff" })]);
    fab.addEventListener("click", function () {
      if (state.tab === "sales") openTransactionModal("sale");
      else if (state.tab === "purchases") openTransactionModal("purchase");
      else openItemModal();
    });
    app.appendChild(fab);
  }

  app.appendChild(BottomNav());
  root.appendChild(app);
}

renderApp();
})();
</script>
</body>
</html>
