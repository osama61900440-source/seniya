<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ትርፌ-ነው (Landed Cost Pro)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0a09; --card: #161412; --border: #332d26;
            --gold: #d4a843; --gold-light: #f4d03f;
            --green: #2ecc71; --red: #e74c3c; --text: #f5f0e1; --muted: #a19584;
        }

        body {
            font-family: 'Noto Serif Ethiopic', serif; background: var(--bg);
            color: var(--text); margin: 0; padding-bottom: 90px;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 500px; margin: 0 auto; }

        .header {
            background: linear-gradient(180deg, #1f1a14 0%, var(--bg) 100%);
            padding: 25px 20px; border-bottom: 2px solid var(--gold); text-align: center;
        }

        .section { padding: 15px; display: none; animation: fadeIn 0.3s ease-in; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 15px; padding: 18px; margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        label { display: block; font-size: 12px; color: var(--gold); margin: 12px 0 6px; font-weight: bold; }
        
        input {
            width: 100%; background: #000; border: 1px solid var(--border);
            border-radius: 10px; padding: 14px; color: #fff; font-family: inherit;
            box-sizing: border-box; font-size: 15px; transition: border 0.3s;
        }
        input:focus { border-color: var(--gold); outline: none; }

        .btn {
            background: linear-gradient(90deg, var(--gold), #b8860b);
            color: #000; border: none; border-radius: 10px;
            padding: 15px; font-weight: bold; width: 100%; cursor: pointer; 
            margin-top: 20px; font-size: 16px; text-transform: uppercase;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        .calc-box {
            background: rgba(212, 168, 67, 0.08); border: 1px dashed var(--gold);
            padding: 20px; border-radius: 12px; margin-top: 20px; text-align: center;
        }

        .nav {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: #000; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; padding: 12px 0;
            z-index: 1000;
        }

        .nav-btn {
            background: none; border: none; color: var(--muted);
            font-size: 11px; display: flex; flex-direction: column; align-items: center;
            cursor: pointer; gap: 5px; transition: 0.3s;
        }

        .nav-btn i { font-style: normal; font-size: 20px; }
        .nav-btn.active { color: var(--gold-light); }

        .result-val { font-size: 26px; font-weight: bold; color: var(--gold-light); margin: 5px 0; }
        
        .inv-card { display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: none; border: 1px solid var(--red); color: var(--red); 
                      padding: 4px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size:24px; color:var(--gold-light); letter-spacing: 1px;">ትርፌ-ነው</h1>
        <p style="margin:5px 0 0; font-size:11px; color:var(--muted); text-transform: uppercase;">የወጪና ትርፍ መቆጣጠሪያ v2.0</p>
    </div>

    <div id="calc" class="section active">
        <div class="card">
            <b style="color:var(--gold-light); font-size: 16px;">🚚 የመነሻ ዋጋ ስሌት (Landed Cost)</b>
            
            <label>የዕቃው ስም</label>
            <input type="text" id="itemName" placeholder="ለምሳሌ፡ ጀበና">

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>ጠቅላላ ብዛት</label>
                    <input type="number" id="qty" oninput="doCalc()" placeholder="0">
                </div>
                <div style="flex: 1;">
                    <label>መግዣ ዋጋ (ነጠላ)</label>
                    <input type="number" id="buyPrice" oninput="doCalc()" placeholder="0.00">
                </div>
            </div>

            <label>ጠቅላላ የትራንስፖርት ወጪ</label>
            <input type="number" id="trans" oninput="doCalc()" placeholder="0.00">

            <label>ጫኝና አውራጅ / ሌሎች ወጪዎች</label>
            <input type="number" id="labor" oninput="doCalc()" placeholder="0.00">

            <div class="calc-box">
                <div style="font-size:13px; color:var(--muted);">አንድ ዕቃ የቆመበት እውነተኛ ዋጋ፦</div>
                <div class="result-val" id="landedPrice">0.00 ብር</div>
                <div id="suggestion" style="font-size:12px; margin-top:8px; color:var(--green); font-weight: bold;"></div>
            </div>

            <button class="btn" onclick="saveToInv()">ወደ ክምችት መዝግብ ✓</button>
        </div>
    </div>

    <div id="list" class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <b style="color:var(--gold-light);">📦 የተመዘገቡ ዕቃዎች</b>
            <span id="itemCount" style="font-size: 12px; color: var(--muted);">0 ዕቃዎች</span>
        </div>
        <div id="invList"></div>
    </div>

    <nav class="nav">
        <button class="nav-btn active" onclick="showTab('calc', this)"><i>🧮</i><span>አስላ</span></button>
        <button class="nav-btn" onclick="showTab('list', this)"><i>📦</i><span>ክምችት</span></button>
    </nav>
</div>

<script>
    let inventory = JSON.parse(localStorage.getItem('j_inv_v2')) || [];

    function showTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'list') renderInv();
    }

    function doCalc() {
        const qty = parseFloat(document.getElementById('qty').value) || 0;
        const buy = parseFloat(document.getElementById('buyPrice').value) || 0;
        const trans = parseFloat(document.getElementById('trans').value) || 0;
        const labor = parseFloat(document.getElementById('labor').value) || 0;

        const landedPriceEl = document.getElementById('landedPrice');
        const suggestionEl = document.getElementById('suggestion');

        if(qty > 0) {
            const totalExtra = trans + labor;
            const extraPerUnit = totalExtra / qty;
            const finalUnitCost = buy + extraPerUnit;

            landedPriceEl.innerText = finalUnitCost.toLocaleString(undefined, {minimumFractionDigits: 2}) + " ብር";
            
            // 20% ትርፍ ጥቆማ
            const minSell = finalUnitCost * 1.20;
            suggestionEl.innerText = "ጥቆማ፡ ቢያንስ በ " + minSell.toLocaleString(undefined, {minimumFractionDigits: 2}) + " ብር ቢሸጥ ያተርፋል።";
        } else {
            landedPriceEl.innerText = "0.00 ብር";
            suggestionEl.innerText = "";
        }
    }

    function saveToInv() {
        const name = document.getElementById('itemName').value.trim();
        const qty = document.getElementById('qty').value;
        const landed = document.getElementById('landedPrice').innerText;

        if(!name || !qty || landed === "0.00 ብር") {
            alert("እባክህ ሁሉንም መረጃዎች በትክክል ሙላ!");
            return;
        }

        inventory.unshift({ 
            name, 
            qty, 
            cost: landed, 
            date: new Date().toLocaleDateString('am-ET') 
        });
        
        localStorage.setItem('j_inv_v2', JSON.stringify(inventory));
        alert("ተመዝግቧል!");
        clearForm();
    }

    function clearForm() {
        ['itemName', 'qty', 'buyPrice', 'trans', 'labor'].forEach(id => document.getElementById(id).value = "");
        document.getElementById('landedPrice').innerText = "0.00 ብር";
        document.getElementById('suggestion').innerText = "";
    }

    function renderInv() {
        const div = document.getElementById('invList');
        document.getElementById('itemCount').innerText = inventory.length + " ዕቃዎች";
        
        div.innerHTML = inventory.length ? "" : "<div style='text-align:center; padding:50px; color:var(--muted);'>ምንም ዕቃ አልተመዘገበም።</div>";
        
        inventory.forEach((item, idx) => {
            div.innerHTML += `
                <div class="card inv-card">
                    <div>
                        <b style="font-size:16px;">${item.name}</b>
                        <p style="font-size:12px; color:var(--muted); margin:5px 0;">
                            ብዛት: ${item.qty} | መነሻ ዋጋ: <span style="color:var(--gold-light); font-weight:bold;">${item.cost}</span>
                        </p>
                        <small style="font-size:10px; color:var(--border);">${item.date}</small>
                    </div>
                    <button class="delete-btn" onclick="deleteItem(${idx})">ሰርዝ</button>
                </div>
            `;
        });
    }

    function deleteItem(idx) {
        if(confirm("ይህ ዕቃ ከዝርዝሩ ይጥፋ?")) {
            inventory.splice(idx, 1);
            localStorage.setItem('j_inv_v2', JSON.stringify(inventory));
            renderInv();
        }
    }
</script>

</body>
</html>
