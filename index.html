<!DOCTYPE html>
<html lang="am" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>የሱቅ መቆጣጠሪያ ሲስተም</title>
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Business%20Tracker%22,%22short_name%22:%22Tracker%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23F5F7F9%22,%22theme_color%22:%22%23123A5E%22,%22description%22:%22የሱቅ%20መቆጣጠሪያ%20እና%20የሂሳብ%20መመዝገቢያ%22}" />
<!-- Firebase Libraries (SDK v9 Compatibility) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<!-- UI Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "Noto Sans Ethiopic", "Segoe UI", Roboto, sans-serif; margin:0; background-color: #F5F7F9; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

const STORAGE_KEY = "shop-control-data-v3";
const CONFIG_STORAGE_KEY = "firebase-config-key";
const fmt = (n) => (Number(n) || 0).toLocaleString("en-US") + " ብር";

// የኢትዮጵያ ወራት ዝርዝር
const ETH_MONTHS = ["መስከረም", "ጥቅምት", "ህዳር", "ታህሳስ", "ጥር", "የካቲት", "መጋቢት", "ሚያዝያ", "ግንቦት", "ሰኔ", "ሐምሌ", "ነሐሴ", "ጳጉሜን"];
const WEEK_DAYS = ["ሰኞ", "ማክሰኞ", "ረቡዕ", "ሐሙስ", "አርብ", "ቅዳሜ", "እሑድ"];

function App() {
  // የ Firebase ማዋቀሪያ ስቴት
  const [fbConfig, setFbConfig] = useState(() => {
    const saved = localStorage.getItem(CONFIG_STORAGE_KEY);
    return saved ? JSON.parse(saved) : { apiKey: "", databaseURL: "", projectId: "" };
  });

  const [dbConnected, setDbConnected] = useState(false);
  const [database, setDatabase] = useState(null);

  // ዋናው ዳታ
  const [data, setData] = useState(() => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try { return JSON.parse(saved); } catch(e) {}
    }
    return {
      items: [{ id: "1", name: "ጄልና", price: 222, stock: 50 }],
      sales: [],
      expenses: [],
      capital: 124375,
      partners: [{ name: "እኔ", share: 50 }, { name: "ወንድሜ", share: 30 }, { name: "እህቴ", share: 20 }]
    };
  });

  const [tab, setTab] = useState("dashboard");
  const [showMenu, setShowMenu] = useState(false);
  const [selectedItemId, setSelectedItemId] = useState("");
  const [saleQty, setSaleQty] = useState(1);
  const [newItemName, setNewItemName] = useState("");
  const [newItemPrice, setNewItemPrice] = useState("");
  const [newItemStock, setNewItemStock] = useState("");

  // የሪፖርቶች መመልከቻ ንዑስ ገጾች
  const [subReport, setSubReport] = useState(null); // 'weekly', 'monthly', 'yearly', 'sharing', 'firebase'

  // --- Firebase ዳታቤዝ ግንኙነት ---
  useEffect(() => {
    if (fbConfig.apiKey && fbConfig.databaseURL && fbConfig.projectId) {
      try {
        if (!firebase.apps.length) {
          firebase.initializeApp(fbConfig);
        }
        const db = firebase.database();
        setDatabase(db);
        setDbConnected(true);

        // ዳታውን ከደመና ላይ በሪል-ታይም ማንበብ
        db.ref("shopData").on("value", (snapshot) => {
          const cloudData = snapshot.val();
          if (cloudData) {
            setData(cloudData);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudData));
          }
        });
      } catch (err) {
        console.error("Firebase Connection Error:", err);
        setDbConnected(false);
      }
    }
  }, [fbConfig]);

  // ዳታ ሲቀየር ሴቭ ማድረግ
  const updateData = (newData) => {
    setData(newData);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(newData));
    if (dbConnected && database) {
      database.ref("shopData").set(newData);
    }
  };

  // የ Firebase ቁልፍ ማስቀመጫ
  const handleSaveConfig = (e) => {
    e.preventDefault();
    localStorage.setItem(CONFIG_STORAGE_KEY, JSON.stringify(fbConfig));
    alert("የዳታቤዝ መረጃው ተቀምጧል! አፑን ሪፍሬሽ በማድረግ ይገናኛል።");
    window.location.reload();
  };

  // ስታቲስቲክስ ስሌቶች
  const todaySales = useMemo(() => data.sales.reduce((sum, s) => sum + s.total, 0), [data.sales]);
  const todayExpenses = useMemo(() => data.expenses.reduce((sum, e) => sum + e.amount, 0), [data.expenses]);
  const todayProfit = todaySales - todayExpenses;

  // በጣም የተሸጠ ዕቃ ስሌት
  const topSellingItem = useMemo(() => {
    if (data.sales.length === 0) return "ምንም አልተሸጠም";
    const counts = {};
    data.sales.forEach(s => {
      counts[s.itemName] = (counts[s.itemName] || 0) + s.qty;
    });
    let topItem = "";
    let maxQty = 0;
    Object.keys(counts).forEach(name => {
      if (counts[name] > maxQty) {
        maxQty = counts[name];
        topItem = `${name} (${maxQty} ጊዜ)`;
      }
    });
    return topItem;
  }, [data.sales]);

  // የሚያልቁ ዕቃዎች (ስቶክ ከ 5 በታች)
  const lowStockItems = useMemo(() => {
    return data.items.filter(i => (i.stock || 0) <= 5);
  }, [data.items]);

  // ሽያጭ መመዝገብ
  const handleAddSale = () => {
    const item = data.items.find(i => i.id === selectedItemId);
    if (!item) return alert("እባክዎ መጀመሪያ ዕቃ ይምረጡ!");
    if (item.stock < saleQty) return alert("በቂ ስቶክ የለም! የቀረው ስቶክ: " + item.stock);

    const total = item.price * saleQty;
    const today = new Date();
    const newSale = {
      id: Date.now().toString(),
      itemName: item.name,
      qty: Number(saleQty),
      total: total,
      date: today.toLocaleDateString(),
      dayName: WEEK_DAYS[today.getDay() === 0 ? 6 : today.getDay() - 1], // ሰኞ - እሑድ
      monthName: ETH_MONTHS[Math.min(12, today.getMonth())], // የኢትዮጵያ ወራት በግምት
      year: today.getFullYear()
    };

    const updatedData = {
      ...data,
      sales: [...data.sales, newSale],
      capital: data.capital + total,
      items: data.items.map(i => i.id === item.id ? { ...i, stock: i.stock - saleQty } : i)
    };

    updateData(updatedData);
    setSaleQty(1);
    alert("ሽያጭ ተመዝግቧል!");
  };

  // አዲስ ዕቃ መጨመር
  const handleAddItem = () => {
    if (!newItemName || !newItemPrice || !newItemStock) return alert("እባክዎ ሁሉንም ሳጥን ይሙሉ!");
    const newItem = {
      id: Date.now().toString(),
      name: newItemName,
      price: Number(newItemPrice),
      stock: Number(newItemStock)
    };
    const updatedData = { ...data, items: [...data.items, newItem] };
    updateData(updatedData);
    setNewItemName(""); setNewItemPrice(""); setNewItemStock("");
    alert("አዲስ ዕቃ ተጨምሯል!");
  };

  // ዕቃ ማጥፊያ
  const handleDeleteItem = (id) => {
    if(confirm("ይህንን ዕቃ በእርግጥ ማጥፋት ይፈልጋሉ?")) {
      const updatedData = { ...data, items: data.items.filter(i => i.id !== id) };
      updateData(updatedData);
    }
  };

  // --- በሳምንት ቀናት የተከፋፈለ ሪፖርት ማሳያ ---
  const weeklyReport = useMemo(() => {
    const report = {};
    WEEK_DAYS.forEach(day => { report[day] = 0; });
    data.sales.forEach(s => {
      if (s.dayName) {
        report[s.dayName] = (report[s.dayName] || 0) + s.total;
      }
    });
    return report;
  }, [data.sales]);

  // --- በወራት የተከፋፈለ ሪፖርት ማሳያ ---
  const monthlyReport = useMemo(() => {
    const report = {};
    ETH_MONTHS.forEach(m => { report[m] = 0; });
    data.sales.forEach(s => {
      if (s.monthName) {
        report[s.monthName] = (report[s.monthName] || 0) + s.total;
      }
    });
    return report;
  }, [data.sales]);

  // --- በአመታት የተከፋፈለ ሪፖርት ማሳያ ---
  const yearlyReport = useMemo(() => {
    const report = {};
    data.sales.forEach(s => {
      const y = s.year || new Date().getFullYear();
      report[y] = (report[y] || 0) + s.total;
    });
    return report;
  }, [data.sales]);

  return (
    <div className="w-full max-w-md mx-auto min-h-screen flex flex-col justify-between bg-[#F5F7F9] relative">
      
      {/* ራስጌ ክፍል ከሜኑ ቁልፍ ጋር */}
      <div className="bg-white py-4 px-4 shadow-sm flex justify-between items-center border-b">
        <button onClick={() => setShowMenu(true)} className="text-2xl p-1 text-slate-700">☰</button>
        <h1 className="text-lg font-bold text-slate-800">የሱቅ መቆጣጠሪያ ሲስተም</h1>
        <div className={`w-3 h-3 rounded-full ${dbConnected ? 'bg-green-500' : 'bg-red-400'}`} title={dbConnected ? 'Firebase ተያይዟል' : 'የአካባቢ ማህደረ ትውስታ'} />
      </div>

      {/* ባለ ሦስት መስመር ሜኑ (Hamburger Menu) */}
      {showMenu && (
        <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex">
          <div className="w-2/3 bg-white h-full p-5 space-y-6 flex flex-col justify-between">
            <div className="space-y-6">
              <div className="flex justify-between items-center border-b pb-3">
                <h2 className="font-bold text-slate-800">⚙️ ዋና ዝርዝሮች</h2>
                <button onClick={() => setShowMenu(false)} className="text-xl font-bold text-red-500">✕</button>
              </div>
              <nav className="space-y-4">
                <button onClick={() => { setSubReport('weekly'); setShowMenu(false); }} className="w-full text-left font-medium py-2 text-sm text-slate-700 flex items-center gap-2">📅 ሳምንታዊ ሪፖርት</button>
                <button onClick={() => { setSubReport('monthly'); setShowMenu(false); }} className="w-full text-left font-medium py-2 text-sm text-slate-700 flex items-center gap-2">🗓️ ወርሃዊ ሪፖርት</button>
                <button onClick={() => { setSubReport('yearly'); setShowMenu(false); }} className="w-full text-left font-medium py-2 text-sm text-slate-700 flex items-center gap-2">📆 አመታዊ ሪፖርት</button>
                <button onClick={() => { setSubReport('sharing'); setShowMenu(false); }} className="w-full text-left font-medium py-2 text-sm text-slate-700 flex items-center gap-2">💰 የትርፍ ክፍፍል</button>
                <button onClick={() => { setSubReport('firebase'); setShowMenu(false); }} className="w-full text-left font-medium py-2 text-sm text-blue-600 font-bold flex items-center gap-2">☁️ የጋራ ዳታቤዝ (Firebase)</button>
              </nav>
            </div>
            <p className="text-[10px] text-slate-400 text-center">Nika Tracker v3.0</p>
          </div>
          <div className="flex-1" onClick={() => setShowMenu(false)}></div>
        </div>
      )}

      {/* ዋናው ይዘት */}
      <div className="flex-1 p-4 overflow-y-auto pb-24">
        
        {/* ንዑስ ገጽ: ሳምንታዊ ሪፖርት */}
        {subReport === 'weekly' && (
          <div className="bg-white rounded-2xl p-4 shadow-sm space-y-4">
            <div className="flex justify-between items-center border-b pb-2">
              <h3 className="font-bold text-slate-800">📅 ሳምንታዊ ሪፖርት (በየቀኑ)</h3>
              <button onClick={() => setSubReport(null)} className="text-xs text-blue-600 font-bold">ተመለስ</button>
            </div>
            <div className="space-y-2">
              {WEEK_DAYS.map(day => (
                <div key={day} className="flex justify-between p-2 bg-slate-50 rounded text-sm">
                  <span className="font-medium">{day}</span>
                  <span className="font-bold text-slate-700">{fmt(weeklyReport[day])}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ንዑስ ገጽ: ወርሃዊ ሪፖርት */}
        {subReport === 'monthly' && (
          <div className="bg-white rounded-2xl p-4 shadow-sm space-y-4">
            <div className="flex justify-between items-center border-b pb-2">
              <h3 className="font-bold text-slate-800">🗓️ ወርሃዊ ሪፖርት (በየወሩ)</h3>
              <button onClick={() => setSubReport(null)} className="text-xs text-blue-600 font-bold">ተመለስ</button>
            </div>
            <div className="grid grid-cols-2 gap-2">
              {ETH_MONTHS.map(month => (
                <div key={month} className="p-3 bg-slate-50 rounded-xl text-center">
                  <p className="text-xs text-slate-400">{month}</p>
                  <p className="font-bold text-sm text-slate-800 mt-1">{fmt(monthlyReport[month])}</p>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ንዑስ ገጽ: አመታዊ ሪፖርት */}
        {subReport === 'yearly' && (
          <div className="bg-white rounded-2xl p-4 shadow-sm space-y-4">
            <div className="flex justify-between items-center border-b pb-2">
              <h3 className="font-bold text-slate-800">📆 አመታዊ ሪፖርት</h3>
              <button onClick={() => setSubReport(null)} className="text-xs text-blue-600 font-bold">ተመለስ</button>
            </div>
            <div className="space-y-2">
              {Object.keys(yearlyReport).length === 0 ? (
                <p className="text-xs text-slate-400">ምንም አመታዊ መረጃ የለም።</p>
              ) : (
                Object.keys(yearlyReport).map(year => (
                  <div key={year} className="flex justify-between p-3 bg-slate-50 rounded-xl">
                    <span className="font-bold text-sm">{year} ዓ.ም</span>
                    <span className="font-bold text-emerald-600">{fmt(yearlyReport[year])}</span>
                  </div>
                ))
              )}
            </div>
          </div>
        )}

        {/* ንዑስ ገጽ: የትርፍ ክፍፍል */}
        {subReport === 'sharing' && (
          <div className="bg-white rounded-2xl p-4 shadow-sm space-y-4">
            <div className="flex justify-between items-center border-b pb-2">
              <h3 className="font-bold text-slate-800">💰 የትርፍ ክፍፍል (ከዛሬ ትርፍ: {fmt(todayProfit)})</h3>
              <button onClick={() => setSubReport(null)} className="text-xs text-blue-600 font-bold">ተመለስ</button>
            </div>
            <div className="space-y-3">
              {data.partners.map(p => {
                const shareAmount = (todayProfit * p.share) / 100;
                return (
                  <div key={p.name} className="p-3 bg-slate-50 rounded-xl flex justify-between items-center">
                    <div>
                      <p className="font-bold text-sm text-slate-800">{p.name}</p>
                      <p className="text-xs text-slate-400">ድርሻ መጠን: {p.share}%</p>
                    </div>
                    <p className="font-extrabold text-base text-emerald-600">{fmt(shareAmount)}</p>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ንዑስ ገጽ: የጋራ ዳታቤዝ (Firebase) ማያያዣ */}
        {subReport === 'firebase' && (
          <div className="bg-white rounded-2xl p-4 shadow-sm space-y-4">
            <div className="flex justify-between items-center border-b pb-2">
              <h3 className="font-bold text-slate-800">☁️ የጋራ ዳታቤዝ ማያያዣ (Firebase)</h3>
              <button onClick={() => setSubReport(null)} className="text-xs text-blue-600 font-bold">ተመለስ</button>
            </div>
            <form onSubmit={handleSaveConfig} className="space-y-3 text-xs">
              <div>
                <label className="block text-slate-500 mb-1">Database URL (የዳታቤዝ አድራሻ)</label>
                <input 
                  type="text" 
                  placeholder="https://your-app-default-rtdb.firebaseio.com"
                  className="w-full bg-slate-50 border p-2.5 rounded-lg outline-none"
                  value={fbConfig.databaseURL}
                  onChange={e => setFbConfig({...fbConfig, databaseURL: e.target.value})}
                  required
                />
              </div>
              <div>
                <label className="block text-slate-500 mb-1">API Key (የደህንነት ቁልፍ)</label>
                <input 
                  type="text" 
                  placeholder="AIzaSy..."
                  className="w-full bg-slate-50 border p-2.5 rounded-lg outline-none"
                  value={fbConfig.apiKey}
                  onChange={e => setFbConfig({...fbConfig, apiKey: e.target.value})}
                  required
                />
              </div>
              <div>
                <label className="block text-slate-500 mb-1">Project ID (የፕሮጀክት መለያ)</label>
                <input 
                  type="text" 
                  placeholder="seniy-624d6"
                  className="w-full bg-slate-50 border p-2.5 rounded-lg outline-none"
                  value={fbConfig.projectId}
                  onChange={e => setFbConfig({...fbConfig, projectId: e.target.value})}
                  required
                />
              </div>
              <button type="submit" className="w-full bg-blue-600 text-white font-bold py-2.5 rounded-xl mt-2 text-xs">
                ማስተካከያውን አስቀምጥና አገናኝ
              </button>
            </form>
          </div>
        )}

        {/* መደበኛ የዳሽቦርድ ዕይታ */}
        {!subReport && (
          <div>
            {/* TAB 1: ዳሽቦርድ */}
            {tab === "dashboard" && (
              <div className="space-y-4">
                <h2 className="text-sm font-semibold text-slate-500">📊 የሱቅ ወቅታዊ ሁኔታ</h2>
                
                <div className="bg-white border-l-4 border-blue-500 rounded-xl p-4 shadow-sm flex justify-between items-center">
                  <div>
                    <p className="text-xs text-slate-400 font-medium">💰 ጠቅላላ ካፒታል</p>
                    <p className="text-lg font-bold text-slate-800 mt-1">{fmt(data.capital)}</p>
                  </div>
                </div>

                <div className="bg-white border-l-4 border-green-500 rounded-xl p-4 shadow-sm flex justify-between items-center">
                  <div>
                    <p className="text-xs text-slate-400 font-medium">📈 የቀን የተጣራ ትርፍ</p>
                    <p className="text-lg font-bold text-green-600 mt-1">{fmt(todayProfit)}</p>
                  </div>
                </div>

                <div className="bg-white border-l-4 border-red-500 rounded-xl p-4 shadow-sm flex justify-between items-center">
                  <div>
                    <p className="text-xs text-slate-400 font-medium">📉 የቀን ጠቅላላ ወጪ</p>
                    <p className="text-lg font-bold text-red-500 mt-1">{fmt(todayExpenses)}</p>
                  </div>
                </div>

                <div className="bg-amber-50 border-l-4 border-amber-500 rounded-xl p-4 shadow-sm flex justify-between items-center">
                  <div>
                    <p className="text-xs text-amber-600 font-medium">🔥 በጣም የሚሸጠው ዕቃ</p>
                    <p className="text-base font-bold text-amber-900 mt-1">{topSellingItem}</p>
                  </div>
                </div>

                {/* የሚያልቁ ዕቃዎች ማስጠንቀቂያ */}
                <div className="bg-white rounded-xl p-4 shadow-sm border border-orange-100">
                  <h3 className="text-xs font-bold text-orange-600 mb-2">⚠️ ያለቁ / የሚያልቁ ዕቃዎች</h3>
                  {lowStockItems.length === 0 ? (
                    <p className="text-xs text-slate-400">ሁሉም ዕቃዎች በቂ ስቶክ አላቸው።</p>
                  ) : (
                    <div className="space-y-1.5">
                      {lowStockItems.map(i => (
                        <div key={i.id} className="flex justify-between items-center text-xs bg-orange-50 p-2 rounded">
                          <span className="font-medium text-slate-700">{i.name}</span>
                          <span className="bg-orange-200 text-orange-800 px-2 py-0.5 rounded-full font-bold">ቀሪ ስቶክ: {i.stock}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* TAB 2: ሽያጭ መመዝገቢያ */}
            {tab === "sales" && (
              <div className="space-y-4">
                <h2 className="text-sm font-semibold text-slate-500">📝 ሽያጭ መመዝገቢያ ፎርም</h2>
                
                <div className="bg-white rounded-2xl p-4 shadow-sm space-y-4">
                  <div>
                    <label className="text-xs font-medium text-slate-500 block mb-1">የሚሸጠውን ዕቃ ይምረጡ፦</label>
                    <select 
                      className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none"
                      value={selectedItemId}
                      onChange={(e) => setSelectedItemId(e.target.value)}
                    >
                      <option value="">ዕቃ ይምረጡ...</option>
                      {data.items.map(i => (
                        <option key={i.id} value={i.id}>{i.name} (ዋጋ: {i.price} ብር - ስቶክ: {i.stock})</option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="text-xs font-medium text-slate-500 block mb-1">የዕቃ ብዛት (መጠን)፦</label>
                    <div className="flex items-center gap-2">
                      <button 
                        onClick={() => setSaleQty(Math.max(1, saleQty - 1))}
                        className="w-10 h-10 bg-slate-100 font-bold rounded-lg text-slate-700 flex items-center justify-center border"
                      >-</button>
                      <input 
                        type="number" 
                        min="1" 
                        className="flex-1 text-center bg-slate-50 border border-slate-200 rounded-lg p-2 font-bold text-sm"
                        value={saleQty}
                        onChange={(e) => setSaleQty(Math.max(1, Number(e.target.value)))}
                      />
                      <button 
                        onClick={() => setSaleQty(saleQty + 1)}
                        className="w-10 h-10 bg-slate-100 font-bold rounded-lg text-slate-700 flex items-center justify-center border"
                      >+</button>
                    </div>
                  </div>

                  <button 
                    onClick={handleAddSale}
                    className="w-full bg-emerald-500 text-white font-bold py-3.5 rounded-xl hover:bg-emerald-600 transition shadow-md mt-2"
                  >
                    ሽያጭ መዝግብ ({saleQty} ዕቃ)
                  </button>
                </div>
              </div>
            )}

            {/* TAB 3: የዕቃዎች ዝርዝር እና መሰረዣ */}
            {tab === "items" && (
              <div className="space-y-4">
                <h2 className="text-sm font-semibold text-slate-500">📦 አዲስ ዕቃ መጨመሪያ</h2>
                
                <div className="bg-white rounded-2xl p-4 shadow-sm space-y-3">
                  <input type="text" placeholder="የዕቃ ስም" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none" value={newItemName} onChange={e=>setNewItemName(e.target.value)} />
                  <div className="grid grid-cols-2 gap-2">
                    <input type="number" placeholder="የመሸጫ ዋጋ" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none" value={newItemPrice} onChange={e=>setNewItemPrice(e.target.value)} />
                    <input type="number" placeholder="የመጀመሪያ ስቶክ" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none" value={newItemStock} onChange={e=>setNewItemStock(e.target.value)} />
                  </div>
                  <button onClick={handleAddItem} className="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-xl text-sm">ዕቃ ጨምር +</button>
                </div>

                <div className="space-y-2">
                  <h3 className="text-xs font-bold text-slate-400">የተመዘገቡ ዕቃዎች ዝርዝር</h3>
                  {data.items.map(i => (
                    <div key={i.id} className="bg-white p-3 rounded-xl shadow-sm flex justify-between items-center border">
                      <div>
                        <p className="font-bold text-sm text-slate-800">{i.name}</p>
                        <p className="text-xs text-slate-400">ዋጋ: {i.price} ብር | ስቶክ: {i.stock}</p>
                      </div>
                      <button 
                        onClick={() => handleDeleteItem(i.id)} 
                        className="p-2 text-red-100 hover:text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition text-xs"
                      >
                        🗑️ ማጥፊያ
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

      </div>

      {/* ታችኛው ማውጫ (Bottom Navigation) */}
      <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#1A1A1A] p-2 flex justify-around items-center rounded-t-2xl shadow-xl z-40">
        <button onClick={() => { setSubReport(null); setTab("dashboard"); }} className={`flex flex-col items-center flex-1 py-1 ${!subReport && tab === 'dashboard' ? 'text-white font-bold' : 'text-slate-400'}`}>
          <span className="text-lg">🏠</span>
          <span className="text-[10px] mt-0.5">ዳሽቦርድ</span>
        </button>
        <button onClick={() => { setSubReport(null); setTab("sales"); }} className={`flex flex-col items-center flex-1 py-1 ${!subReport && tab === 'sales' ? 'text-white font-bold' : 'text-slate-400'}`}>
          <span className="text-lg">📦</span>
          <span className="text-[10px] mt-0.5">ሽያጭ</span>
        </button>
        <button onClick={() => { setSubReport(null); setTab("items"); }} className={`flex flex-col items-center flex-1 py-1 ${!subReport && tab === 'items' ? 'text-white font-bold' : 'text-slate-400'}`}>
          <span className="text-lg">➕</span>
          <span className="text-[10px] mt-0.5">ዕቃ ጨምር</span>
        </button>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
