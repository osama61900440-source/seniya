<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ተርፌ (Landed Cost Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0a09; --card: #161412; --border: #332d26;
            --gold: #d4a843; --gold-light: #f4d03f;
            --green: #2ecc71; --red: #e74c3c; --text: #f5f0e1; --muted: #a19584;
        }

        body {
            font-family: 'Noto Serif Ethiopic', serif; background: var(--bg);
            color: var(--text); margin: 0; padding-bottom: 90px;
        }

        .container { width: 100%; max-width: 500px; margin: 0 auto; }

        .header {
            background: linear-gradient(180deg, #1f1a14 0%, var(--bg) 100%);
            padding: 20px; border-bottom: 2px solid var(--gold); text-align: center;
        }

        .section { padding: 15px; display: none; }
        .section.active { display: block; }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 15px; padding: 18px; margin-bottom: 15px;
        }

        label { display: block; font-size: 12px; color: var(--gold); margin: 10px 0 5px; }
        input {
            width: 100%; background: #000; border: 1px solid var(--border);
            border-radius: 10px; padding: 12px; color: #fff; font-family: inherit;
            box-sizing: border-box;
        }

        .btn {
            background: var(--gold); color: #000; border: none; border-radius: 10px;
            padding: 14px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px;
        }

        .calc-box {
            background: rgba(212, 168, 67, 0.1); border: 1px dashed var(--gold);
            padding: 15px; border-radius: 10px; margin-top: 10px;
        }

        .nav {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: #000; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; padding: 10px 0;
        }

        .nav-btn {
            background: none; border: none; color: var(--muted);
            font-size: 10px; display: flex; flex-direction: column; align-items: center;
        }

        .nav-btn.active { color: var(--gold-light); }

        .result-val { font-size: 22px; font-weight: bold; color: var(--gold-light); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size:22px; color:var(--gold-light);">ጀበና-ሰፌድ ፕሮ</h1>
        <p style="margin:5px 0 0; font-size:12px; color:var(--muted);">የወጪና ትርፍ መቆጣጠሪያ</p>
    </div>

    <div id="calc" class="section active">
        <div class="card">
            <b style="color:var(--gold-light);">🚚 የወጪ ስሌት (Landed Cost)</b>
            <p style="font-size:11px; color:var(--muted);">ዕቃው መጋዘን እስኪገባ የወጣውን ወጪ እዚህ አስላ</p>
            
            <label>የዕቃው ስም</label>
            <input type="text" id="itemName" placeholder="ለምሳሌ፦ ጀበና">

            <label>ጠቅላላ ብዛት</label>
            <input type="number" id="qty" oninput="doCalc()" placeholder="ስንት ፍሬ?">

            <label>አንዱ የተገዛበት ዋጋ (Unit Price)</label>
            <input type="number" id="buyPrice" oninput="doCalc()" placeholder="0.00">

            <label>የትራንስፖርት ወጪ (ጠቅላላ)</label>
            <input type="number" id="trans" oninput="doCalc()" placeholder="0.00">

            <label>የጫኝና አውራጅ/ሌሎች ወጪዎች</label>
            <input type="number" id="labor" oninput="doCalc()" placeholder="0.00">

            <div class="calc-box">
                <div style="font-size:12px; color:var(--muted);">የአንዱ ዕቃ እውነተኛ መነሻ ዋጋ፦</div>
                <div class="result-val" id="landedPrice">0.00 ብር</div>
                <div id="suggestion" style="font-size:11px; margin-top:5px; color:var(--green);"></div>
            </div>

            <button class="btn" onclick="saveToInv()">ወደ ክምችት መዝግብ ✓</button>
        </div>
    </div>

    <div id="list" class="section">
        <b style="color:var(--gold-light);">📦 በክምችት ላይ ያሉ</b>
        <div id="invList" style="margin-top:15px;"></div>
    </div>

    <nav class="nav">
        <button class="nav-btn active" onclick="showTab('calc', this)"><i>🧮</i><span>አስላ</span></button>
        <button class="nav-btn" onclick="showTab('list', this)"><i>📦</i><span>ክምችት</span></button>
    </nav>
</div>

<script>
    let inventory = JSON.parse(localStorage.getItem('j_inv_v2')) || [];

    function showTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'list') renderInv();
    }

    function doCalc() {
        const qty = parseFloat(document.getElementById('qty').value) || 0;
        const buy = parseFloat(document.getElementById('buyPrice').value) || 0;
        const trans = parseFloat(document.getElementById('trans').value) || 0;
        const labor = parseFloat(document.getElementById('labor').value) || 0;

        if(qty > 0) {
            const totalExtra = trans + labor;
            const extraPerUnit = totalExtra / qty;
            const finalUnitCost = buy + extraPerUnit;

            document.getElementById('landedPrice').innerText = finalUnitCost.toFixed(2) + " ብር";
            
            // Suggestion: 20% profit
            const minSell = finalUnitCost * 1.20;
            document.getElementById('suggestion').innerText = "ጥቆማ፡ ቢያንስ በ " + minSell.toFixed(2) + " ብር ብትሸጠው ያተርፋል።";
        }
    }

    function saveToInv() {
        const name = document.getElementById('itemName').value;
        const qty = document.getElementById('qty').value;
        const landed = document.getElementById('landedPrice').innerText;

        if(!name || !qty || landed === "0.00 ብር") return alert("እባክህ መረጃዎችን በትክክል ሙላ!");

        inventory.push({ name, qty, cost: landed, date: new Date().toLocaleDateString() });
        localStorage.setItem('j_inv_v2', JSON.stringify(inventory));
        
        alert("በተሳካ ሁኔታ ተመዝግቧል!");
        clearForm();
    }

    function clearForm() {
        document.getElementById('itemName').value = "";
        document.getElementById('qty').value = "";
        document.getElementById('buyPrice').value = "";
        document.getElementById('trans').value = "";
        document.getElementById('labor').value = "";
        document.getElementById('landedPrice').innerText = "0.00 ብር";
        document.getElementById('suggestion').innerText = "";
    }

    function renderInv() {
        const div = document.getElementById('invList');
        div.innerHTML = inventory.length ? "" : "<p style='color:var(--muted);'>ምንም ዕቃ የለም።</p>";
        inventory.forEach((item, idx) => {
            div.innerHTML += `
                <div class="card">
                    <b>${item.name}</b>
                    <p style="font-size:12px; color:var(--muted); margin:5px 0;">
                        ብዛት: ${item.qty} | የመነሻ ዋጋ: <span style="color:var(--gold);">${item.cost}</span>
                    </p>
                    <button onclick="deleteItem(${idx})" style="background:none; border:none; color:var(--red); font-size:11px; padding:0;">ሰርዝ ✕</button>
                </div>
            `;
        });
    }

    function deleteItem(idx) {
        if(confirm("ይህ ዕቃ ይጥፋ?")) {
            inventory.splice(idx, 1);
            localStorage.setItem('j_inv_v2', JSON.stringify(inventory));
            renderInv();
        }
    }
</script>

</body>
</html>
